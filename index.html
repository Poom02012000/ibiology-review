  :root {
    --ground: #F5E9D6;
    --card: #FFFDF8;
    --ink: #3A2F08;
    --ink-soft: #8A784A;
    --line: #E9DCC2;
    --leaf: #EF7E10;
    --leaf-dark: #D5531A;
    --leaf-tint: #F6ECD9;
    --star: #EF7E10;
    --focus: #EF7E10;
  }

  * { box-sizing: border-box; }

  body { margin: 0; }

  .page {
    font-family: "LINE Seed Sans TH", system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, #FBF3E6 0%, var(--ground) 60%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 28px 16px 48px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    background: var(--card);
    width: 100%;
    max-width: 540px;
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: 0 12px 32px -18px rgba(20, 35, 26, 0.35);
    overflow: hidden;
  }

  .head {
    padding: 26px 24px 20px;
    background: linear-gradient(180deg, var(--leaf-tint) 0%, #FFFFFF 100%);
    border-bottom: 1px solid var(--line);
  }

  .brand {
    display: flex;
    width: fit-content;
    align-items: center;
    gap: 11px;
    margin-bottom: 14px;
    background: #F5E8D2;
    padding: 8px 18px 8px 12px;
    border-radius: 16px;
  }
  .logo-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
  }
  .logo-img {
    width: auto;
    height: 42px;
    object-fit: contain;
    display: block;
  }
  .brand-name {
    color: var(--ink);
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 0.2px;
  }
  .brand-name .i { color: var(--leaf); }

  .eyebrow {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--leaf-dark);
    background: var(--leaf-tint);
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 10px;
  }

  h1 {
    margin: 0 0 6px;
    font-size: 1.5rem;
    line-height: 1.3;
    text-wrap: balance;
  }
  .sub {
    margin: 0;
    color: var(--ink-soft);
    font-size: 0.95rem;
  }

  form { padding: 22px 24px 8px; display: flex; flex-direction: column; gap: 18px; }

  .field { display: flex; flex-direction: column; gap: 7px; }

  label {
    font-size: 0.92rem;
    font-weight: 600;
  }
  label .req { color: var(--leaf); }
  label .opt { color: var(--ink-soft); font-weight: 400; font-size: 0.82rem; }

  input[type="text"], textarea {
    font: inherit;
    color: var(--ink);
    background: #FFFDF7;
    border: 1px solid var(--line);
    border-radius: 11px;
    padding: 12px 14px;
    width: 100%;
    transition: border-color .15s, box-shadow .15s;
  }
  textarea { resize: vertical; min-height: 120px; }
  input::placeholder, textarea::placeholder { color: #B8A57E; }

  input:focus, textarea:focus {
    outline: none;
    border-color: var(--focus);
    box-shadow: 0 0 0 3px rgba(239, 126, 16, 0.18);
  }

  .stars { display: flex; gap: 4px; }
  .star-btn {
    background: none;
    border: none;
    padding: 2px;
    cursor: pointer;
    font-size: 2rem;
    line-height: 1;
    color: #E7DBC2;
    transition: transform .12s, color .12s;
  }
  .star-btn:hover { transform: scale(1.12); }
  .star-btn.on { color: var(--star); }
  .star-btn:focus-visible { outline: 2px solid var(--focus); outline-offset: 3px; border-radius: 6px; }
  .rate-label { font-size: 0.85rem; color: var(--ink-soft); min-height: 1.2em; }

  .err { color: #C0392B; font-size: 0.82rem; min-height: 0; }

  .actions { padding: 4px 24px 24px; display: flex; flex-direction: column; gap: 10px; }

  .btn {
    font: inherit;
    font-weight: 700;
    border-radius: 12px;
    padding: 14px 18px;
    border: 1px solid transparent;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background .15s, transform .05s, border-color .15s;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--leaf); color: #fff; }
  .btn-primary:hover { background: var(--leaf-dark); }
  .btn-line { background: #06C755; color: #fff; }
  .btn-line:hover { background: #05a648; }
  .btn-ghost { background: #fff; color: var(--ink); border-color: var(--line); }
  .btn-ghost:hover { border-color: var(--leaf); color: var(--leaf-dark); }

  .result { display: none; padding: 8px 24px; }
  .result.show { display: block; text-align: center; }
  .success-mark {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--leaf);
    color: #fff;
    font-size: 32px;
    line-height: 60px;
    font-weight: 700;
    margin: 8px auto 14px;
    box-shadow: 0 8px 20px -8px rgba(239, 126, 16, 0.6);
  }
  .result h2 { font-size: 1.25rem; margin: 0 0 8px; }
  .preview {
    background: var(--leaf-tint);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    white-space: pre-wrap;
    font-size: 0.9rem;
    color: var(--ink);
  }
  .hint { font-size: 0.85rem; color: var(--ink-soft); margin: 12px 0 0; }

  .foot {
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.8rem;
    padding: 6px 24px 22px;
  }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 26px;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: #fff;
    padding: 12px 20px;
    border-radius: 999px;
    font-size: 0.9rem;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s, transform .25s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>

<div class="page">
  <main class="card">
    <div class="head">

          <button type="button" class="star-btn" data-v="4" aria-label="4 ดาว">★</button>
          <button type="button" class="star-btn" data-v="5" aria-label="5 ดาว">★</button>
        </div>
        <div class="rate-label" id="rateLabel"></div>
      </div>

      <div class="field">
        <label for="content">ภาพรวมเนื้อหา <span class="req">*</span></label>
        <textarea id="content" name="content" placeholder="เนื้อหาเข้าใจง่ายไหม? ชอบส่วนไหน? มีอะไรอยากให้ปรับปรุงเพิ่มเติมไหมครับ"></textarea>
      </div>

      <div class="err" id="err"></div>

      <div class="actions" style="padding-left:0;padding-right:0;padding-bottom:0;">
        <button type="submit" class="btn btn-primary">ส่งรีวิว</button>
      </div>
    </form>

    <div class="result" id="result" aria-live="polite">
      <div class="success-mark" aria-hidden="true">✓</div>
      <h2>ขอบคุณมากครับ! 🎉</h2>
      <p class="hint">บันทึกรีวิวของคุณเรียบร้อยแล้ว ความเห็นของคุณมีค่ามากสำหรับ <b>iBiology</b> 🌿</p>
    </div>

    <div class="actions" id="sendActions" style="display:none;">
      <button class="btn btn-ghost" id="againBtn" type="button">เขียนรีวิวใหม่</button>
    </div>

    <p class="foot">ขอบคุณที่สละเวลารีวิวครับ — iBiology</p>
  </main>
</div>

<div class="toast" id="toast">คัดลอกแล้ว ✓</div>

<script>
  (function () {
    var rating = 0;
    var starBtns = Array.prototype.slice.call(document.querySelectorAll('.star-btn'));
    var rateLabel = document.getElementById('rateLabel');
    var labels = ['', 'ต้องปรับปรุง', 'พอใช้', 'ดี', 'ดีมาก', 'ยอดเยี่ยม'];

    function paintStars() {
      starBtns.forEach(function (b) {
        b.classList.toggle('on', parseInt(b.dataset.v, 10) <= rating);
      });
      rateLabel.textContent = rating ? '★'.repeat(rating) + '  ' + labels[rating] : '';
    }
    starBtns.forEach(function (b) {
      b.addEventListener('click', function () {
        var v = parseInt(b.dataset.v, 10);
        rating = (rating === v) ? 0 : v;
        paintStars();
      });
    });

    // --- Supabase (auto-save reviews) ---
    var SUPABASE_URL = 'https://axackomhgowlozprdfpl.supabase.co';
    var SUPABASE_KEY = 'sb_publishable_A-PgbaJBDwQdxqXi4ahEqg_m2yRGj2d';

    var form = document.getElementById('reviewForm');
    var err = document.getElementById('err');
    var result = document.getElementById('result');
    var sendActions = document.getElementById('sendActions');
    var submitBtn = form.querySelector('button[type="submit"]');

    function val(id) { return document.getElementById(id).value.trim(); }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      err.textContent = '';
      if (!val('name') || !val('school') || !val('content')) {
        err.textContent = 'กรุณากรอก ชื่อ, โรงเรียน และ ภาพรวมเนื้อหา ให้ครบก่อนนะครับ';
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = 'กำลังส่ง...';

      fetch(SUPABASE_URL + '/rest/v1/ibiology_reviews', {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({
          name: val('name'),
          school: val('school'),
          rating: rating || null,
          content: val('content')
        })
      }).then(function (res) {
        if (!res.ok) { throw new Error('HTTP ' + res.status); }
        form.style.display = 'none';
        result.classList.add('show');
        sendActions.style.display = 'flex';
        result.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }).catch(function () {
        submitBtn.disabled = false;
        submitBtn.textContent = 'ส่งรีวิว';
        err.textContent = 'ส่งไม่สำเร็จ กรุณาลองใหม่อีกครั้ง (ตรวจสอบอินเทอร์เน็ต)';
      });
    });

    document.getElementById('againBtn').addEventListener('click', function () {
      form.reset();
      rating = 0;
      paintStars();
      submitBtn.disabled = false;
      submitBtn.textContent = 'ส่งรีวิว';
      form.style.display = 'flex';
      result.classList.remove('show');
      sendActions.style.display = 'none';
      form.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  })();
</script>
